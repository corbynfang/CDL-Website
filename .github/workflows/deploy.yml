name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]

env:
  REGION: us-east-1
  TASK_FAMILY: cdl-api

jobs:
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    # Only deploy when CI completed successfully.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4.2.2

      # ── AWS credentials ──────────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      # ── Read Terraform outputs (no apply — infra changes are manual) ─────────
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infrastructure
        run: terraform init -input=false

      - name: Read Terraform outputs
        working-directory: infrastructure
        run: |
          echo "ECR_URL=$(terraform output -raw ecr_repository_url)"        >> $GITHUB_ENV
          echo "S3_BUCKET=$(terraform output -raw s3_bucket_name)"          >> $GITHUB_ENV
          echo "CF_DIST_ID=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_ENV
          echo "ECS_CLUSTER=$(terraform output -raw ecs_cluster)"           >> $GITHUB_ENV
          echo "ECS_SERVICE=$(terraform output -raw ecs_service)"           >> $GITHUB_ENV

      # ── Build and push Docker image ──────────────────────────────────────────
      - name: Log in to ECR
        run: |
          aws ecr get-login-password --region $REGION | \
            docker login --username AWS --password-stdin $ECR_URL

      - name: Build and push Docker image
        run: |
          GIT_SHA=$(git rev-parse --short HEAD)
          docker build --platform linux/amd64 \
            -t "${ECR_URL}:${GIT_SHA}" \
            -t "${ECR_URL}:latest" .
          docker push "${ECR_URL}:${GIT_SHA}"
          docker push "${ECR_URL}:latest"
          echo "GIT_SHA=${GIT_SHA}" >> $GITHUB_ENV

      # ── Update ECS service ───────────────────────────────────────────────────
      - name: Register new ECS task definition
        run: |
          CURRENT_TASK=$(aws ecs describe-task-definition \
            --task-definition "$TASK_FAMILY" \
            --region "$REGION" \
            --query "taskDefinition" \
            --output json)

          NEW_TASK=$(echo "$CURRENT_TASK" | jq \
            --arg IMAGE "${ECR_URL}:${GIT_SHA}" \
            '.containerDefinitions[0].image = $IMAGE
             | del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                   .placementConstraints, .compatibilities, .registeredAt, .registeredBy)')

          NEW_TASK_ARN=$(aws ecs register-task-definition \
            --region "$REGION" \
            --cli-input-json "$NEW_TASK" \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          echo "NEW_TASK_ARN=${NEW_TASK_ARN}" >> $GITHUB_ENV

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --region "$REGION" \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "$NEW_TASK_ARN" \
            --force-new-deployment \
            --output json > /dev/null

      # ── Build and deploy frontend ────────────────────────────────────────────
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build frontend
        working-directory: frontend-react
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Sync frontend to S3
        working-directory: frontend-react
        run: |
          aws s3 sync dist/ "s3://${S3_BUCKET}/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

          aws s3 cp dist/index.html "s3://${S3_BUCKET}/index.html" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CF_DIST_ID" \
            --paths "/*" \
            --output json > /dev/null

      - name: Done
        run: echo "Deploy complete — https://cdlytics.com @ $GIT_SHA"
