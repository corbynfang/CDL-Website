name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  check:
    name: Build checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Go build
        run: go build ./...

      - name: Go tests
        run: go test ./...

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        working-directory: frontend-react
        run: bun install --frozen-lockfile

      - name: TypeScript type check
        working-directory: frontend-react
        run: bunx tsc --noEmit

      - name: Frontend tests
        working-directory: frontend-react
        run: bun run test
